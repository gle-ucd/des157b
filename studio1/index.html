<!DOCTYPE html>

</head>
<body>

    <div id="media1-container">
        <div class="content-wrapper">
            <video id="media1" poster="images/media1.png" muted autoplay playsinline>
                <source src="media/media1.webm" type="video/webm">
                <source src="media/media1.mp4" type="video/mp4">

                <p>Your browser doesn't support HTML5 video. Here is a <a href="media/media1.mp4">link to the video</a> instead.</p>
            </video>
        </div>
    </div>
    

    <div id="media2-container">
        <div class="content-wrapper">
            <video id="media2" poster="images/media2.png" muted playsinline>
                <source src="media/media2.webm" type="video/webm">
                <source src="media/media2.mp4" type="video/mp4">

                <p>Your browser doesn't support HTML5 video. Here is a <a href="media/media2.mp4">link to the video</a> instead.</p>
            </video>
        </div>
    </div>

    <div id="media3-container">
        <div class="content-wrapper">

            </video>
        </div>
    </div>

    <section id="poem">
        <p class="line" id="line1">The world is a beautiful place</p>
        <p class="line" id="line2">to be born into</p>
        <p class="line" id="line3">if you don't mind happiness</p>
        <p class="line" id="line4">not always being</p>
        <p class="line" id="line5">so very much fun</p>
        <p class="line" id="line6">if you don't mind a touch of hell</p>
        <p class="line" id="line7">now and then</p>
        <p class="line" id="line8">just when everything is fine</p>
        <p class="line" id="line9">because even in heaven</p>
        <p class="line" id="line10">they don't sing</p>
        <p class="line" id="line11">all the time</p>
        <p class="line" id="line12">&ndash;Lawrence Ferlinghetti</p>
    </section>

    <div id="expand">
        <i class="fas fa-expand"></i>
    </div>

    <div id="loading">
        <div class="loader"></div>
    </div>
    

</body>
</html>
